name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [orchestrator-ms, measure-ms, microcontrollers-ms, publisher-ms]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Install dependencies and test
        run: |
          cd ${{ matrix.service }}
          npm ci || npm install
          npm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd stats-ms
          pip install -r requirements.txt
      - name: Test Python
        run: |
          cd stats-ms
          pytest

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Build & Test Go
        run: |
          cd auth-ms/src
          go test -v -coverprofile=coverage.out ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 85.0" | bc -l) )); then
            echo "Coverage is below 85%"
            exit 1
          fi

  test-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Install & Test Angular
        run: |
          cd angular-ms/iot-app
          npm ci || npm install
          ng test --watch=false --browsers=ChromeHeadless --code-coverage
