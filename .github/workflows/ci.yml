name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-node:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [orchestrator-ms, measure-ms, microcontrollers-ms, publisher-ms, fake-arduino-iot-pictures]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies and test
        run: |
          cd ${{ matrix.service }}
          npm ci
          npm test

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [stats-ms, ai-ms]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
      - name: Test Python
        run: |
          cd ${{ matrix.service }}
          pytest

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.0'
          cache-dependency-path: 'auth-ms/go.sum'
      - name: Build & Test Go
        run: |
          cd auth-ms
          chmod +x check_coverage.sh
          ./check_coverage.sh

  test-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'angular-ms/iot-app/package-lock.json'
      - name: Install & Test Angular
        run: |
          cd angular-ms/iot-app
          npm ci
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
