name: Test fake-arduino-iot-pictures

on:
  push:
    branches: [ main, master ]
    paths:
      - 'fake-arduino-iot-pictures/**'
  pull_request:
    paths:
      - 'fake-arduino-iot-pictures/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fake-arduino-iot-pictures/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: fake-arduino-iot-pictures

      - name: Run tests
        run: npm test
        working-directory: fake-arduino-iot-pictures
