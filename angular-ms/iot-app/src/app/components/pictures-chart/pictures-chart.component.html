<div class="pictures-container">
  <!-- Camera offline state -->
  <div class="camera-offline" *ngIf="!lastPicture && micro?.isInactive">
    <div class="offline-icon">📷</div>
    <p class="offline-msg">Cámara no disponible</p>
    <p class="offline-sub">El dispositivo no responde</p>
  </div>

  <!-- Loading state: not yet received first picture and not inactive -->
  <div class="camera-loading" *ngIf="!lastPicture && !micro?.isInactive">
    <div class="loading-spinner"></div>
    <p class="loading-msg">Conectando con la cámara…</p>
  </div>

  <div class="current-picture" *ngIf="lastPicture">
    <h3>Etapa Actual: {{ lastPicture.stage | titlecase }}</h3>
    <p>Minutos transcurridos: {{ lastPicture.elapsed_minutes }}</p>
    <img [src]="lastPicture.image_url" alt="Plant growth stage" class="main-img">
  </div>

  <div class="history-log" *ngIf="history.length > 0">
    <h4>Log de Imágenes</h4>
    <div class="history-scroll">
      <div class="history-item" *ngFor="let item of history">
        <img [src]="item.image_url" class="thumb-img">
        <div class="item-info">
          <span>{{ item.timestamp | date:'HH:mm:ss' }}</span>
          <span>{{ item.stage }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="history-nav" *ngIf="lastPicture">
    <button mat-stroked-button color="accent" (click)="goToHistory()">
      <mat-icon>history</mat-icon>
      Ver historial completo
    </button>
  </div>
</div>
