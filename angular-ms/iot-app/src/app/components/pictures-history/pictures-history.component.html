<main class="ph-container" *ngIf="micro">
    <h1 class="ph-title">
        <span class="ph-icon">📷</span>
        Historial de Imágenes — <span class="ph-sensor">{{ micro.sensor }}</span>
    </h1>

    <!-- Date range form -->
    <form class="ph-form" [formGroup]="historyForm" (ngSubmit)="loadHistory(historyForm.value)">
        <mat-form-field appearance="outline">
            <mat-label>Fecha inicial</mat-label>
            <input formControlName="init_date" [matDatepicker]="initPicker" matInput>
            <mat-datepicker-toggle [for]="initPicker" matSuffix></mat-datepicker-toggle>
            <mat-datepicker #initPicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Fecha final</mat-label>
            <input formControlName="end_date" [matDatepicker]="endPicker" matInput>
            <mat-datepicker-toggle [for]="endPicker" matSuffix></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
        </mat-form-field>

        <button color="primary" [disabled]="historyForm.invalid || isLoading" mat-raised-button type="submit">
            <mat-icon>history</mat-icon>
            Cargar
        </button>
    </form>

    <!-- Loading state -->
    <div class="ph-loading" *ngIf="isLoading">
        <div class="ph-spinner"></div>
        <p>Buscando fotografías…</p>
    </div>

    <!-- Empty state -->
    <div class="ph-empty" *ngIf="noResults && !isLoading">
        <span class="ph-empty-icon">🔍</span>
        <p>No hay fotografías en el período seleccionado.</p>
    </div>

    <!-- Gallery -->
    <div class="ph-gallery" *ngIf="pictures.length > 0 && !isLoading">
        <mat-card class="ph-card" *ngFor="let pic of pictures">
            <img [src]="pic.image_url" [alt]="pic.stage" class="ph-img">
            <mat-card-content class="ph-card-content">
                <p class="ph-stage">{{ stageLabel(pic.stage) }}</p>
                <p class="ph-date">{{ pic.timestamp | date:'dd/MM/yy HH:mm' }}</p>
                <p class="ph-elapsed">{{ pic.elapsed_minutes }} min</p>
            </mat-card-content>
        </mat-card>
    </div>
</main>
