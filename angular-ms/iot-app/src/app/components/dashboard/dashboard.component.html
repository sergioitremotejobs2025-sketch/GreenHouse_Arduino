<main class="container">
  <div class="empty-state glass" *ngIf="microcontrollers.length === 0">
    <div class="empty-icon shadow-lg">🔌</div>
    <h2>{{ 'DASHBOARD.EMPTY_STATE' | translate }}</h2>
    <p class="text-muted">{{ 'DASHBOARD.EMPTY_SUB' | translate }}</p>
    <button mat-flat-button color="primary" routerLink="/settings">{{ 'DASHBOARD.ADD_DEV' | translate }}</button>
  </div>

  <div class="measure-section" *ngFor="let micro of microcontrollers">
    <div class="section-header">
      <app-dashboard-microcontroller [isHistory]="false" [micro]="micro"></app-dashboard-microcontroller>
    </div>

    <!-- Humidity -->
    <div class="dashboard-grid" *ngIf="micro.measure === 'humidity'">
      <div class="card chart-card shadow-sm">
        <app-humidity-chart (inactivity)="changeActivity($event)"
          (measure)="humidityStats.newMeasure($event); updateRecentValues(micro, $event)" [micro]="micro"
          *ngIf="humidityStats">
        </app-humidity-chart>
      </div>
      <div class="card stats-card shadow-sm">
        <app-humidity-stats #humidityStats></app-humidity-stats>
      </div>
      <div class="card ai-card shadow-sm">
        <app-ai-predictor [ip]="micro.ip" [measure]="micro.measure"
          [recentValues]="getRecentValues(micro)"></app-ai-predictor>
      </div>
    </div>

    <!-- Light -->
    <div class="dashboard-grid" *ngIf="micro.measure === 'light'">
      <div class="card chart-card shadow-sm">
        <app-light-chart (inactivity)="changeActivity($event)"
          (measure)="lightStats.newMeasure($event); updateRecentValues(micro, $event)" [micro]="micro"
          *ngIf="lightStats">
        </app-light-chart>
      </div>
      <div class="card stats-card shadow-sm">
        <app-light-stats #lightStats></app-light-stats>
      </div>
      <div class="card ai-card shadow-sm">
        <app-ai-predictor [ip]="micro.ip" [measure]="micro.measure"
          [recentValues]="getRecentValues(micro)"></app-ai-predictor>
      </div>
    </div>

    <!-- Temperature -->
    <div class="dashboard-grid" *ngIf="micro.measure === 'temperature'">
      <div class="card chart-card shadow-sm">
        <app-temperature-chart (inactivity)="changeActivity($event)"
          (measure)="temperatureStats.newMeasure($event); updateRecentValues(micro, $event)" [micro]="micro"
          *ngIf="temperatureStats">
        </app-temperature-chart>
      </div>
      <div class="card stats-card shadow-sm">
        <app-temperature-stats #temperatureStats></app-temperature-stats>
      </div>
      <div class="card ai-card shadow-sm">
        <app-ai-predictor [ip]="micro.ip" [measure]="micro.measure"
          [recentValues]="getRecentValues(micro)"></app-ai-predictor>
      </div>
    </div>

    <!-- Pictures -->
    <div class="dashboard-grid full-width" *ngIf="micro.measure === 'pictures'">
      <div class="card picture-card shadow-sm">
        <app-pictures-chart (inactivity)="changeActivity($event)" [micro]="micro">
        </app-pictures-chart>
      </div>
    </div>
  </div>
</main>
