<mat-card class="float-left">
  <mat-card-title>Tiempo real</mat-card-title>
  <button class="absolute black" (click)="getCurrentMeasure(false)" mat-icon-button>
    <mat-icon>sync</mat-icon>
  </button>
  <mat-card-content>
    <img class="light-image" [src]="'assets/images/light_' + lightStatus() + '.png'">
    <div class="switch-container">
      <app-switch
        [checked]="isLightOn()"
        [disabled]="disabledBtn()"
        (toggleChange)="slideChange($event)">
        <span class="off-label">OFF</span>
        <span>ON</span>
      </app-switch>
    </div>
  </mat-card-content>
</mat-card>
