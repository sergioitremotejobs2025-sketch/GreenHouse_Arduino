apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-ms
  namespace: default
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "3"
        # Optional: Specify scaling based on concurrency
        autoscaling.knative.dev/target: "10"
    spec:
      containerConcurrency: 10
      containers:
      - image: europe-west1-docker.pkg.dev/iot-microservices-gcp/iot-repo/ai-ms:latest
        env:
        - name: MONGO_URL
          value: "mongo"
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: secrets
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: secrets
              key: MONGO_INITDB_ROOT_PASSWORD
        - name: MONGO_DB
          value: "iot"
        - name: INTERNAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: secrets
              key: INTERNAL_API_KEY
        - name: MODEL_DIR
          value: "/app/data/models"
        - name: PORT
          value: "8080" # Knative expects 8080 by default
        resources:
          limits:
            cpu: "500m"
            memory: "768Mi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - name: ai-models-volume
          mountPath: /app/data/models
        - name: tmp-volume
          mountPath: /tmp
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: ai-models-volume
        persistentVolumeClaim:
          claimName: ai-models-pvc
      - name: tmp-volume
        emptyDir: {}
